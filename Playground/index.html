<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rune Playground</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="toolbar">
    <span class="logo">Rune Playground</span>
    <div class="toolbar-actions">
      <select id="examples" title="Load an example">
        <option value="">Examples...</option>
      </select>
      <button id="new-btn" title="New single-file program">New</button>
      <button id="share-btn" title="Copy share link">Share</button>
      <button id="run-btn" disabled title="Run (Ctrl+Enter)">&#9654; Run</button>
      <button id="stop-btn" disabled title="Stop running program">Stop</button>
    </div>
  </header>

  <main class="panes">
    <section class="pane editor-pane">
      <div class="pane-header editor-header">
        <span>Code</span>
        <select id="source-files" title="Source file"></select>
      </div>
      <textarea id="editor" class="editor" spellcheck="false" autocomplete="off" autocorrect="off"
        autocapitalize="off"></textarea>
    </section>

    <div class="divider" id="divider"></div>

    <section class="pane output-pane">
      <div class="pane-header">
        <div class="pane-tabs" role="tablist" aria-label="Run result views">
          <button id="output-tab" class="pane-tab active" type="button" role="tab" aria-selected="true"
            aria-controls="output">Output</button>
          <button id="display-tab" class="pane-tab" type="button" role="tab" aria-selected="false"
            aria-controls="display">Display</button>
        </div>
        <span id="status-badge" class="status-badge hidden"></span>
        <span id="elapsed" class="elapsed hidden"></span>
        <button id="clear-btn" class="clear-btn" title="Clear">&#10005;</button>
      </div>
      <div class="result-views">
        <div id="output" class="output result-view active" role="tabpanel" aria-labelledby="output-tab">
          <span class="placeholder">Loading...</span>
        </div>
        <div id="display" class="display result-view" role="tabpanel" aria-labelledby="display-tab" hidden>
          <canvas id="canvas" class="display-canvas"></canvas>
        </div>
      </div>
    </section>
  </main>

  <!-- Generated by Scripts/Playground/embed_examples.py -->
  <script src="examples.js"></script>
  <!-- Emscripten glue (produced by cmake --build --target rune_playground) -->
  <script src="rune_playground.js"></script>
  <script src="main.js"></script>
</body>

</html>
